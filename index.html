
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>События вокруг!</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        #map {
            width: 100%;
            height: 100%;
        }

        .leaflet-control-attribution {
            display: none;
        }

        .leaflet-popup-content-wrapper {
            padding: 10px;
            font-family: Arial, sans-serif;
            box-shadow: 0 4px 10px rgba(0,0,0,.15);
            max-width: 300px;
            max-height: 290px;
        }

        .popup-title {
            font-weight: bold;
            font-size: 15px;
            margin-bottom: 5px;
        }

        .popup-text {
            font-size: 13px;
            margin-bottom: 10px;
        }

        .popup-button {
            display: inline-block;
            padding: 8px 16px;
            background: linear-gradient(to right, hwb(151 82% 0%), hsl(179, 100%, 70%));
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            font-size: 14px;
            text-decoration: none;
        }

        .popup-button:hover {
            background: linear-gradient(to right, #8fe5ff, #d4feff);
            transform: scale(1.05);
        }

        .osm-attribution {
            position: absolute;
            bottom: 10px; 
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(255, 255, 255, 0.8); 
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            z-index: 1000; 
        }

        .leaflet-default-icon-path {
            background-color: #000;
        }
        .leaflet-circle {
            stroke: rgb(133, 255, 160) !important;
            fill-opacity: 0.3 !important;
        }
    </style>
</head>
<body>
<div id="map"></div>
<div class="osm-attribution"><a href="https://sites.google.com/view/dudov-official/пользовательское-соглашение" target="_blank">Соглашение</a></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    function openExternalLink(url) {
        window.open(url, '_blank');
    }

    async function initMap(lat, lon) {
        const map = L.map('map').setView([lat, lon], 12);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        const data = await fetch('https://raw.githubusercontent.com/andreikadudov-a11y/base-ss/refs/heads/main/points.json')
            .then(resp => resp.json());

        data.forEach(p => {
            const marker = L.marker([p.lat, p.lon]).addTo(map);

            marker.bindPopup(`
                <p class="popup-title">${p.title}</p>
                <p class="popup-text">${p.description}</p>
                <img style="width: 90%; max-height: 90px; object-fit: cover;" src="${p.imageUrl}">
                <a href="#" class="popup-button" onclick="openExternalLink('${p.source}')">Подробнее</a>
            `);

            L.circle([p.lat, p.lon], {
                color: 'green',
                fillColor: '#008000',
                fillOpacity: 0.3,
                radius: p.radius
            }).addTo(map);
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        const fallback = [58.311389, 82.902688];

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                pos => initMap(pos.coords.latitude, pos.coords.longitude),
                () => initMap(...fallback),
                { timeout: 3000 }
            );
        } else {
            initMap(...fallback);
        }
    });
</script>
</body>
</html>
