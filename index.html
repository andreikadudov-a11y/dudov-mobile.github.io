
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>События рядом</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        /* Оставил твои стили */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        #map {
            width: 100%;
            height: 100%;
        }

        .leaflet-control-attribution {
            display: none;
        }

        .leaflet-popup-content-wrapper {
            padding: 10px;
            font-family: Arial, sans-serif;
            box-shadow: 0 4px 10px rgba(0,0,0,.15);
            max-width: 300px;
            max-height: 290px;
        }

        .popup-title {
            font-weight: bold;
            font-size: 15px;
            margin-bottom: 5px;
        }

        .popup-text {
            font-size: 13px;
            margin-bottom: 10px;
        }

        .popup-button {
            display: inline-block;
            padding: 8px 16px;
            background: linear-gradient(to right, hwb(151 82% 0%), hsl(179, 100%, 70%));
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            font-size: 14px;
            text-decoration: none;
        }

        .popup-button:hover {
            background: linear-gradient(to right, #8fe5ff, #d4feff);
            transform: scale(1.05);
        }

        .osm-attribution {
            position: absolute;
            bottom: 10px; 
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(255, 255, 255, 0.8); 
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            z-index: 1000; 
        }

        .leaflet-default-icon-path {
            background-color: #000;
        }
        .leaflet-circle {
            stroke: rgb(133, 255, 160) !important;
            fill-opacity: 0.3 !important;
        }
    </style>
</head>
<body>
<div id="map"></div>
<div class="osm-attribution"><a href="https://sites.google.com/view/dudov-official/пользовательское-соглашение" target="_blank">Соглашение</a></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map; // 🔥 Переменная объявлена снаружи

    function openExternalLink(url) {
        window.open(url, '_blank');
    }

    async function loadMarkers(lat, lon) {
        const response = await fetch('https://raw.githubusercontent.com/andreikadudov-a11y/base-ss/refs/heads/main/points.json');
        const data = await response.json();

        data.forEach(point => {
            const marker = L.marker([point.lat, point.lon])
                .bindPopup(`
                    <p class="popup-title">${point.title}</p>
                    <p class="popup-text">${point.description}</p>
                    <img style="width: 90%; max-height: 90px; object-fit: cover;" src="${point.imageUrl}">
                    <a href="#" class="popup-button" onclick="openExternalLink('${point.source}')">Подробнее</a>
                `)
                .addTo(map);

            L.circle([point.lat, point.lon], {
                color: 'green',
                fillColor: '#008000',
                fillOpacity: 0.3,
                radius: point.radius
            }).addTo(map);
        });
    }

    function createMap(lat, lon) {
        map = L.map('map').setView([lat, lon], 12, {
            animate: true,
            duration: 1.5
        });

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        loadMarkers(lat, lon);
    }

    document.addEventListener('DOMContentLoaded', () => {
        const fallback = [58.311389, 82.902688];

        if (!navigator.geolocation) {
            createMap(...fallback);
            return;
        }

        navigator.geolocation.getCurrentPosition(
            pos => createMap(pos.coords.latitude, pos.coords.longitude),
            err => createMap(...fallback)
        );
    });
</script>
</body>
</html>
